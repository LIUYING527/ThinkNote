<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ThinkNote</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg:         #0d0b1a;
      --bg-2:       #13101f;
      --bg-3:       #1a1628;
      --glass:      rgba(255,255,255,0.04);
      --glass-h:    rgba(255,255,255,0.07);
      --border:     rgba(139,92,246,0.18);
      --border-h:   rgba(139,92,246,0.45);
      --p1:         #7c3aed;
      --p2:         #6d28d9;
      --p-light:    #a78bfa;
      --p-soft:     rgba(124,58,237,0.12);
      --p-soft-h:   rgba(124,58,237,0.22);
      --t1:         #f5f3ff;
      --t2:         #c4b5fd;
      --t3:         #a78bfa;
      --tmuted:     #6b7280;
      --ai-bg:      rgba(109,40,217,0.10);
      --user-bg:    rgba(124,58,237,0.22);
      --success:    #10b981;
      --warning:    #f59e0b;
      --info:       #3b82f6;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
      background:var(--bg);
      color:var(--t1);
      height:100dvh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* ===== HEADER ===== */
    .hdr{
      display:flex;align-items:center;
      padding:10px 16px;
      background:var(--bg-2);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      gap:10px;
    }
    .hdr-logo{
      font-size:18px;font-weight:700;letter-spacing:-0.5px;
      background:linear-gradient(135deg,#c4b5fd,#7c3aed);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .hdr-subtitle{font-size:12px;color:var(--tmuted);}
    .hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
    .sync-status{font-size:11px;color:var(--tmuted);padding:4px 10px;border-radius:20px;background:var(--glass);border:1px solid var(--border);}
    .sync-status.ok{color:var(--success);}
    .sync-status.syncing{color:var(--p-light);}

    .ico-btn{
      width:34px;height:34px;border-radius:9px;
      border:1px solid var(--border);background:var(--glass);
      color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:all .2s;flex-shrink:0;
    }
    .ico-btn:hover{background:var(--p-soft-h);border-color:var(--p1);color:var(--p-light);}
    .ico-btn.active{background:var(--p-soft-h);border-color:var(--p1);color:var(--p-light);}

    /* ===== MAIN LAYOUT ===== */
    .main{display:flex;flex:1;overflow:hidden;min-height:0;}

    /* ===== LEFT PANE ===== */
    .left{
      width:360px;min-width:260px;flex-shrink:0;
      display:flex;flex-direction:column;
      border-right:1px solid var(--border);
      background:var(--bg-2);
    }

    .left-top{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .left-top-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .section-label{font-size:11px;color:var(--tmuted);text-transform:uppercase;letter-spacing:.6px;}
    .note-count{margin-left:auto;font-size:11px;color:var(--tmuted);background:var(--glass);padding:2px 8px;border-radius:10px;}

    .type-tabs{display:flex;gap:6px;flex-wrap:wrap;}
    .type-tab{
      padding:4px 10px;border-radius:16px;
      border:1px solid var(--border);background:var(--glass);
      color:var(--tmuted);font-size:12px;cursor:pointer;transition:all .15s;
    }
    .type-tab:hover{color:var(--t2);border-color:rgba(139,92,246,.35);}
    .type-tab.active{background:var(--p-soft-h);border-color:var(--p1);color:var(--p-light);}

    .notes-list{
      flex:1;overflow-y:auto;
      padding:10px;
      display:flex;flex-direction:column;gap:7px;
    }

    .note-card{
      padding:12px;border-radius:11px;
      border:1px solid var(--border);background:var(--glass);
      cursor:pointer;transition:all .18s;
    }
    .note-card:hover{border-color:rgba(139,92,246,.35);background:var(--glass-h);}
    .note-card.active{border-color:var(--p1);background:var(--p-soft-h);box-shadow:0 0 0 1px var(--p1);}

    .nc-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
    .type-badge{
      font-size:11px;padding:2px 7px;border-radius:9px;
      background:var(--p-soft);color:var(--p-light);flex-shrink:0;
    }
    .type-badge.task{background:rgba(16,185,129,.12);color:#6ee7b7;}
    .type-badge.idea{background:rgba(245,158,11,.12);color:#fcd34d;}
    .type-badge.plan{background:rgba(59,130,246,.12);color:#93c5fd;}
    .nc-time{font-size:10px;color:var(--tmuted);margin-left:auto;}
    .nc-preview{font-size:13px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .nc-footer{display:flex;align-items:center;margin-top:7px;gap:6px;}
    .nc-thread-info{font-size:11px;color:var(--tmuted);}
    .nc-del{
      margin-left:auto;width:22px;height:22px;border-radius:6px;
      border:none;background:transparent;color:var(--tmuted);cursor:pointer;
      font-size:13px;display:flex;align-items:center;justify-content:center;
      transition:all .15s;opacity:0;
    }
    .note-card:hover .nc-del{opacity:1;}
    .nc-del:hover{background:rgba(239,68,68,.15);color:#f87171;}

    .empty-notes{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:var(--tmuted);gap:10px;padding:20px;text-align:center;
    }
    .empty-notes-icon{font-size:36px;opacity:.4;}
    .empty-notes-text{font-size:13px;line-height:1.6;}

    /* ===== COMPOSE AREA ===== */
    .compose{
      padding:12px;
      border-top:1px solid var(--border);
      background:var(--bg-3);
      flex-shrink:0;
    }
    .compose-type-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
    .compose-type{
      padding:3px 9px;border-radius:14px;font-size:11px;
      border:1px solid var(--border);background:var(--glass);color:var(--tmuted);
      cursor:pointer;transition:all .15s;
    }
    .compose-type.active{background:var(--p-soft-h);border-color:var(--p1);color:var(--p-light);}

    .compose-textarea{
      width:100%;min-height:72px;max-height:140px;
      padding:10px 12px;border-radius:10px;
      border:1px solid var(--border);background:var(--glass);
      color:var(--t1);font-size:13.5px;line-height:1.6;
      resize:none;outline:none;font-family:inherit;
      transition:border-color .2s;
    }
    .compose-textarea:focus{border-color:var(--p1);}
    .compose-textarea::placeholder{color:var(--tmuted);}

    .compose-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;}
    .compose-hint{font-size:11px;color:var(--tmuted);}
    .send-btn{
      margin-left:auto;padding:7px 18px;border-radius:9px;
      border:none;background:linear-gradient(135deg,var(--p1),var(--p2));
      color:#fff;font-size:13px;font-weight:500;cursor:pointer;
      transition:all .2s;flex-shrink:0;
    }
    .send-btn:hover:not(:disabled){background:linear-gradient(135deg,#8b5cf6,var(--p1));transform:translateY(-1px);}
    .send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

    /* ===== RIGHT PANE ===== */
    .right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

    .right-empty{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:var(--tmuted);gap:12px;
    }
    .right-empty-icon{font-size:52px;opacity:.25;}
    .right-empty-title{font-size:16px;font-weight:600;color:var(--t2);opacity:.5;}
    .right-empty-sub{font-size:13px;text-align:center;line-height:1.6;}

    .convo{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
    .convo.visible{display:flex;}

    .convo-hdr{
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:var(--bg-2);flex-shrink:0;
    }
    .convo-hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .convo-type-badge{font-size:11px;padding:2px 8px;border-radius:9px;background:var(--p-soft);color:var(--p-light);}
    .convo-type-badge.task{background:rgba(16,185,129,.12);color:#6ee7b7;}
    .convo-type-badge.idea{background:rgba(245,158,11,.12);color:#fcd34d;}
    .convo-type-badge.plan{background:rgba(59,130,246,.12);color:#93c5fd;}
    .convo-time{font-size:11px;color:var(--tmuted);}
    .convo-note-content{
      font-size:14px;color:var(--t1);line-height:1.6;
    }

    .thread{
      flex:1;overflow-y:auto;
      padding:18px;
      display:flex;flex-direction:column;gap:14px;
    }

    .msg{display:flex;flex-direction:column;max-width:84%;}
    .msg.ai{align-self:flex-start;}
    .msg.user{align-self:flex-end;}
    .msg-meta{
      font-size:10px;color:var(--tmuted);
      margin-bottom:5px;display:flex;align-items:center;gap:6px;
    }
    .msg.user .msg-meta{justify-content:flex-end;}
    .msg-avatar{
      width:18px;height:18px;border-radius:5px;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;flex-shrink:0;
    }
    .msg.ai .msg-avatar{background:var(--p-soft);color:var(--p-light);}
    .msg.user .msg-avatar{background:var(--user-bg);color:var(--p-light);}

    .msg-bubble{
      padding:12px 15px;font-size:13.5px;line-height:1.75;
      white-space:pre-wrap;word-break:break-word;
    }
    .msg.ai .msg-bubble{
      background:var(--ai-bg);
      border:1px solid rgba(139,92,246,.18);
      border-radius:4px 14px 14px 14px;
      color:var(--t1);
    }
    .msg.user .msg-bubble{
      background:var(--user-bg);
      border:1px solid rgba(139,92,246,.32);
      border-radius:14px 4px 14px 14px;
      color:var(--t1);
    }

    .streaming-cursor::after{
      content:'▋';animation:blink .65s infinite;
      color:var(--p-light);font-size:.85em;vertical-align:middle;
    }
    @keyframes blink{50%{opacity:0;}}

    .typing-indicator{
      display:flex;align-items:center;gap:5px;
      padding:10px 14px;
      background:var(--ai-bg);border:1px solid rgba(139,92,246,.18);
      border-radius:4px 14px 14px 14px;
      width:fit-content;
    }
    .typing-dot{
      width:6px;height:6px;border-radius:50%;background:var(--p-light);
      animation:typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2){animation-delay:.2s;}
    .typing-dot:nth-child(3){animation-delay:.4s;}
    @keyframes typingBounce{
      0%,80%,100%{transform:translateY(0);opacity:.4;}
      40%{transform:translateY(-5px);opacity:1;}
    }

    /* ===== REPLY AREA ===== */
    .reply-area{
      padding:12px 16px;
      border-top:1px solid var(--border);
      background:var(--bg-2);flex-shrink:0;
    }
    .reply-label{font-size:11px;color:var(--tmuted);margin-bottom:7px;}
    .reply-row{display:flex;gap:10px;align-items:flex-end;}
    .reply-textarea{
      flex:1;min-height:44px;max-height:110px;
      padding:10px 12px;border-radius:10px;
      border:1px solid var(--border);background:var(--glass);
      color:var(--t1);font-size:13.5px;line-height:1.6;
      resize:none;outline:none;font-family:inherit;
      transition:border-color .2s;
    }
    .reply-textarea:focus{border-color:var(--p1);}
    .reply-textarea::placeholder{color:var(--tmuted);}
    .reply-send{
      padding:10px 16px;border-radius:9px;
      border:none;background:linear-gradient(135deg,var(--p1),var(--p2));
      color:#fff;font-size:13px;font-weight:500;cursor:pointer;
      transition:all .2s;flex-shrink:0;white-space:nowrap;
    }
    .reply-send:hover:not(:disabled){transform:translateY(-1px);}
    .reply-send:disabled{opacity:.45;cursor:not-allowed;transform:none;}

    /* ===== MODAL ===== */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);display:none;
      align-items:center;justify-content:center;z-index:200;padding:16px;
    }
    .modal-overlay.visible{display:flex;}
    .modal{
      background:var(--bg-2);border:1px solid var(--border);
      border-radius:16px;padding:24px;width:420px;max-width:100%;
    }
    .modal-title{font-size:17px;font-weight:600;color:var(--t1);margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--tmuted);margin-bottom:18px;line-height:1.5;}
    .modal-label{font-size:12px;color:var(--t2);margin-bottom:6px;}
    .modal-input{
      width:100%;padding:10px 13px;border-radius:9px;
      border:1px solid var(--border);background:var(--glass);
      color:var(--t1);font-size:13.5px;outline:none;
      transition:border-color .2s;margin-bottom:14px;font-family:inherit;
    }
    .modal-input:focus{border-color:var(--p1);}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
    .btn-cancel{
      padding:8px 16px;border-radius:9px;border:1px solid var(--border);
      background:transparent;color:var(--t2);font-size:13px;cursor:pointer;
      transition:all .15s;
    }
    .btn-cancel:hover{background:var(--glass-h);}
    .btn-primary{
      padding:8px 20px;border-radius:9px;border:none;
      background:linear-gradient(135deg,var(--p1),var(--p2));
      color:#fff;font-size:13px;font-weight:500;cursor:pointer;
      transition:all .15s;
    }
    .btn-primary:hover{transform:translateY(-1px);}
    .modal-error{font-size:12px;color:#f87171;margin-top:-8px;margin-bottom:10px;display:none;}
    .modal-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
    .modal-link{font-size:12px;color:var(--p-light);cursor:pointer;text-decoration:underline;}
    .modal-link:hover{color:var(--t2);}

    /* ===== TOAST ===== */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--bg-3);border:1px solid var(--border);
      color:var(--t2);padding:10px 20px;border-radius:20px;
      font-size:13px;z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(139,92,246,.25);border-radius:2px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,.45);}

    /* ===== MOBILE ===== */
    @media(max-width:720px){
      .left{width:100%;}
      .right{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);}
      .right.mobile-open{display:flex;}
      .mobile-back{display:flex!important;}
    }
    .mobile-back{display:none;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;cursor:pointer;color:var(--p-light);font-size:14px;}
    .mobile-back:hover{background:var(--glass);}
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <span class="hdr-logo">🧠 ThinkNote</span>
  <span class="hdr-subtitle">思维对话笔记</span>
  <div class="hdr-right">
    <span class="sync-status" id="syncStatus">本地</span>
    <button class="ico-btn" id="settingsBtn" title="API 设置">⚙️</button>
    <button class="ico-btn" id="authBtn" title="账号">👤</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- LEFT PANE -->
  <div class="left">
    <div class="left-top">
      <div class="left-top-row">
        <span class="section-label">我的记录</span>
        <span class="note-count" id="noteCount">0 条</span>
      </div>
      <div class="type-tabs" id="typeTabs">
        <button class="type-tab active" data-type="all">全部</button>
        <button class="type-tab" data-type="thought">💭 想法</button>
        <button class="type-tab" data-type="task">✅ 任务</button>
        <button class="type-tab" data-type="idea">💡 灵感</button>
        <button class="type-tab" data-type="plan">📋 计划</button>
      </div>
    </div>

    <div class="notes-list" id="notesList"></div>

    <!-- Compose -->
    <div class="compose">
      <div class="compose-type-row" id="composeTabs">
        <button class="compose-type active" data-type="thought">💭 想法</button>
        <button class="compose-type" data-type="task">✅ 任务</button>
        <button class="compose-type" data-type="idea">💡 灵感</button>
        <button class="compose-type" data-type="plan">📋 计划</button>
      </div>
      <textarea class="compose-textarea" id="composeInput"
        placeholder="写下你的想法、任务、灵感或计划…  Ctrl+Enter 发送"></textarea>
      <div class="compose-bottom">
        <span class="compose-hint">Ctrl+Enter</span>
        <button class="send-btn" id="sendBtn">发送 →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANE -->
  <div class="right" id="rightPane">
    <div class="mobile-back" id="mobileBack" onclick="closeMobile()">← 返回</div>

    <!-- Empty state -->
    <div class="right-empty" id="rightEmpty">
      <div class="right-empty-icon">💬</div>
      <div class="right-empty-title">选择一条记录</div>
      <div class="right-empty-sub">或在左侧写下新的想法<br>AI 会自动开始与你探讨</div>
    </div>

    <!-- Conversation view -->
    <div class="convo" id="convoView">
      <div class="convo-hdr">
        <div class="convo-hdr-top">
          <span class="convo-type-badge" id="convoTypeBadge">💭 想法</span>
          <span class="convo-time" id="convoTime"></span>
        </div>
        <div class="convo-note-content" id="convoNoteContent"></div>
      </div>

      <div class="thread" id="threadView"></div>

      <div class="reply-area">
        <div class="reply-label">继续探讨这个话题</div>
        <div class="reply-row">
          <textarea class="reply-textarea" id="replyInput"
            placeholder="追问 AI，或补充你的想法… Ctrl+Enter 发送"></textarea>
          <button class="reply-send" id="replyBtn">回复 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">⚙️ API 设置</div>
    <div class="modal-sub">输入 DeepSeek API Key 以启用 AI 思维对话功能</div>
    <div class="modal-label">DeepSeek API Key</div>
    <input class="modal-input" type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <div class="modal-error" id="apiKeyError">API Key 格式有误</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('settingsModal')">取消</button>
      <button class="btn-primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-title" id="authTitle">👤 登录账号</div>
    <div class="modal-sub" id="authSub">登录后笔记将自动同步到云端，多设备共享</div>
    <div class="modal-label">邮箱</div>
    <input class="modal-input" type="email" id="authEmail" placeholder="your@email.com">
    <div class="modal-label">密码</div>
    <input class="modal-input" type="password" id="authPassword" placeholder="密码">
    <div class="modal-error" id="authError"></div>
    <div class="modal-actions">
      <span class="modal-link" id="authToggleLink" onclick="toggleAuthMode()">没有账号？注册</span>
      <button class="btn-cancel" onclick="closeModal('authModal')">取消</button>
      <button class="btn-primary" id="authSubmitBtn" onclick="submitAuth()">登录</button>
    </div>
    <hr class="modal-divider" id="logoutDivider" style="display:none">
    <div style="display:none;text-align:center;" id="logoutSection">
      <span class="modal-link" onclick="logout()">退出登录</span>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">删除这条记录？</div>
    <div class="modal-sub">同时删除与 AI 的全部对话记录，无法恢复。</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('deleteModal')">取消</button>
      <button class="btn-primary" style="background:linear-gradient(135deg,#ef4444,#dc2626);" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ===== CONFIG =====
const DB_NAME    = 'ThinkNote';
const DB_VER     = 1;
const SB_URL     = 'https://wzlypptsytnqfsmwxpzf.supabase.co';
const SB_KEY     = 'sb_publishable_9rXFdTyDO2yai9uLBRJSNQ_6irPiu6E';
const DS_API     = 'https://api.deepseek.com/chat/completions';
const SYNC_DELAY = 3000;

const TYPE_META = {
  thought: { label: '💭 想法', badge: 'thought' },
  task:    { label: '✅ 任务', badge: 'task'    },
  idea:    { label: '💡 灵感', badge: 'idea'    },
  plan:    { label: '📋 计划', badge: 'plan'    },
};

const SYSTEM_PROMPT = `你是「思维伙伴」，一个帮助用户深化思考的AI助手。

**行为准则：**
- 对于「想法/灵感」：提出1-2个尖锐问题，挑战假设，指出潜在盲点，帮助完善想法
- 对于「任务/计划」：分析可行性，拆解关键步骤，预判障碍，给出具体建议
- 对于多轮对话：持续深挖，帮助用户把问题想得更透彻
- 回复简洁有力（3-5段），避免冗长罗列
- 全程用中文，语气像聪明的朋友，而非AI客服
- 不要只是肯定——适时质疑和挑战才是真正的帮助
- 每次回复结尾提出1-2个问题，推动进一步思考`;

// ===== STATE =====
let db          = null;
let notes       = [];          // [{id,type,content,created_at,thread:[{role,content,ts}]}]
let currentId   = null;
let filterType  = 'all';
let composeType = 'thought';
let isStreaming = false;
let sbSession   = null;
let syncTimer   = null;
let deleteTargetId = null;

// ===== IndexedDB =====
function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('notes')) {
        const s = d.createObjectStore('notes', { keyPath: 'id' });
        s.createIndex('created_at', 'created_at', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = () => rej(req.error);
  });
}

function dbAll() {
  return new Promise((res, rej) => {
    const tx  = db.transaction('notes', 'readonly');
    const req = tx.objectStore('notes').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

function dbPut(note) {
  return new Promise((res, rej) => {
    const tx  = db.transaction('notes', 'readwrite');
    const req = tx.objectStore('notes').put(note);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx  = db.transaction('notes', 'readwrite');
    const req = tx.objectStore('notes').delete(id);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function fmtTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000)   return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' 小时前';
  if (diff < 7*86400000) return Math.floor(diff/86400000) + ' 天前';
  return d.getFullYear() === now.getFullYear()
    ? `${d.getMonth()+1}/${d.getDate()}`
    : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function fmtFull(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== RENDER NOTES LIST =====
function sortedNotes() {
  return [...notes].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
}

function filteredNotes() {
  const s = sortedNotes();
  if (filterType === 'all') return s;
  return s.filter(n => n.type === filterType);
}

function renderNotesList() {
  const list = filteredNotes();
  const el   = document.getElementById('notesList');
  document.getElementById('noteCount').textContent = notes.length + ' 条';

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-notes">
      <div class="empty-notes-icon">📝</div>
      <div class="empty-notes-text">还没有记录<br>在下方写下你的第一个想法</div>
    </div>`;
    return;
  }

  el.innerHTML = list.map(n => {
    const m    = TYPE_META[n.type] || TYPE_META.thought;
    const msgs = n.thread ? n.thread.length : 0;
    const isActive = n.id === currentId;
    return `<div class="note-card${isActive ? ' active' : ''}" data-id="${n.id}" onclick="selectNote('${n.id}')">
      <div class="nc-top">
        <span class="type-badge ${n.type}">${m.label}</span>
        <span class="nc-time">${fmtTime(n.created_at)}</span>
      </div>
      <div class="nc-preview">${escHtml(n.content)}</div>
      <div class="nc-footer">
        <span class="nc-thread-info">${msgs > 0 ? `💬 ${msgs} 条对话` : '等待 AI 回应'}</span>
        <button class="nc-del" onclick="askDelete(event,'${n.id}')" title="删除">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SELECT NOTE =====
function selectNote(id) {
  currentId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;

  // Update list highlight
  document.querySelectorAll('.note-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });

  // Show conversation
  document.getElementById('rightEmpty').style.display = 'none';
  const convo = document.getElementById('convoView');
  convo.classList.add('visible');

  const m = TYPE_META[note.type] || TYPE_META.thought;
  const badge = document.getElementById('convoTypeBadge');
  badge.textContent = m.label;
  badge.className = 'convo-type-badge ' + note.type;
  document.getElementById('convoTime').textContent = fmtFull(note.created_at);
  document.getElementById('convoNoteContent').textContent = note.content;

  renderThread(note);
  scrollThread();

  // Mobile
  if (window.innerWidth <= 720) {
    document.getElementById('rightPane').classList.add('mobile-open');
  }
}

// ===== RENDER THREAD =====
function renderThread(note) {
  const el = document.getElementById('threadView');
  if (!note.thread || note.thread.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = note.thread.map((msg,i) => {
    const isAI = msg.role === 'assistant';
    const isLast = i === note.thread.length - 1;
    const streaming = isStreaming && isLast && isAI;
    return `<div class="msg ${isAI ? 'ai' : 'user'}">
      <div class="msg-meta">
        <div class="msg-avatar">${isAI ? '🤖' : '👤'}</div>
        <span>${isAI ? 'ThinkNote AI' : '我'}</span>
        <span>${fmtTime(msg.ts)}</span>
      </div>
      <div class="msg-bubble${streaming ? ' streaming-cursor' : ''}">${escHtml(msg.content)}</div>
    </div>`;
  }).join('');
}

function scrollThread() {
  const el = document.getElementById('threadView');
  setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
}

function showTypingIndicator() {
  const el = document.getElementById('threadView');
  const ind = document.createElement('div');
  ind.className = 'msg ai';
  ind.id = 'typingIndicator';
  ind.innerHTML = `<div class="msg-meta">
    <div class="msg-avatar">🤖</div>
    <span>ThinkNote AI</span>
    <span>正在思考…</span>
  </div>
  <div class="typing-indicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;
  el.appendChild(ind);
  scrollThread();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ===== DeepSeek STREAMING =====
async function streamAI(note, userContent) {
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) {
    openModal('settingsModal');
    showToast('请先设置 API Key');
    return;
  }

  if (isStreaming) return;
  isStreaming = true;
  setReplyDisabled(true);
  document.getElementById('sendBtn').disabled = true;

  // Build messages
  const messages = [{ role: 'system', content: SYSTEM_PROMPT }];

  // Add context: the user's original note as first user message
  if (note.thread.length === 0 || note.thread[0].role !== 'user') {
    // First AI call: include original note + type context
    const typeLabel = TYPE_META[note.type]?.label || '想法';
    messages.push({
      role: 'user',
      content: `[${typeLabel}]\n${userContent}`
    });
  } else {
    // Build from thread
    note.thread.forEach(m => {
      messages.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content });
    });
    messages.push({ role: 'user', content: userContent });
  }

  // Show typing
  showTypingIndicator();

  let fullContent = '';
  let aiMsgIndex = -1;

  try {
    const resp = await fetch(DS_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages,
        stream: true,
        max_tokens: 2000,
        temperature: 1.0
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    removeTypingIndicator();

    // Add placeholder AI message
    const aiMsg = { role: 'assistant', content: '', ts: new Date().toISOString() };
    note.thread.push(aiMsg);
    aiMsgIndex = note.thread.length - 1;
    renderThread(note);
    scrollThread();

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed  = JSON.parse(data);
          const chunk   = parsed.choices?.[0]?.delta?.content;
          if (chunk) {
            fullContent += chunk;
            note.thread[aiMsgIndex].content = fullContent;
            // Update bubble in place
            const bubbles = document.querySelectorAll('#threadView .msg-bubble');
            const lastBubble = bubbles[bubbles.length - 1];
            if (lastBubble) {
              lastBubble.textContent = fullContent;
              lastBubble.classList.add('streaming-cursor');
            }
            scrollThread();
          }
        } catch(_) {}
      }
    }

    // Finalize
    if (aiMsgIndex >= 0) {
      note.thread[aiMsgIndex].content = fullContent;
      note.thread[aiMsgIndex].ts      = new Date().toISOString();
    }
    isStreaming = false;
    renderThread(note);
    await dbPut(note);
    renderNotesList();
    scheduleSyncCloud();

  } catch (e) {
    removeTypingIndicator();
    isStreaming = false;
    if (aiMsgIndex >= 0) note.thread.splice(aiMsgIndex, 1);
    showToast('AI 请求失败: ' + e.message);
    console.error(e);
  } finally {
    isStreaming = false;
    setReplyDisabled(false);
    document.getElementById('sendBtn').disabled = false;
    scrollThread();
  }
}

function setReplyDisabled(d) {
  document.getElementById('replyBtn').disabled   = d;
  document.getElementById('replyInput').disabled = d;
}

// ===== ADD NOTE =====
async function addNote() {
  const input   = document.getElementById('composeInput');
  const content = input.value.trim();
  if (!content || isStreaming) return;

  const note = {
    id:         uuid(),
    type:       composeType,
    content,
    created_at: new Date().toISOString(),
    thread:     []
  };

  notes.unshift(note);
  input.value = '';
  input.style.height = 'auto';

  await dbPut(note);
  renderNotesList();
  selectNote(note.id);

  // Auto-trigger AI
  await streamAI(note, content);
}

// ===== REPLY =====
async function sendReply() {
  const input   = document.getElementById('replyInput');
  const content = input.value.trim();
  if (!content || isStreaming || !currentId) return;

  const note = notes.find(n => n.id === currentId);
  if (!note) return;

  // Add user message to thread
  note.thread.push({ role: 'user', content, ts: new Date().toISOString() });
  input.value = '';
  input.style.height = 'auto';

  renderThread(note);
  scrollThread();
  await dbPut(note);
  renderNotesList();

  // AI response
  await streamAIReply(note);
}

async function streamAIReply(note) {
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { openModal('settingsModal'); return; }
  if (isStreaming) return;

  isStreaming = true;
  setReplyDisabled(true);
  document.getElementById('sendBtn').disabled = true;

  const messages = [{ role: 'system', content: SYSTEM_PROMPT }];

  // First message: include type context
  const typeLabel = TYPE_META[note.type]?.label || '想法';
  const firstUser = note.thread.find(m => m.role === 'user');
  if (firstUser) {
    messages.push({ role: 'user', content: `[${typeLabel}]\n${firstUser.content}` });
  }

  // Rest of thread
  const rest = firstUser ? note.thread.slice(note.thread.indexOf(firstUser) + 1) : note.thread;
  rest.forEach(m => messages.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }));

  showTypingIndicator();

  let fullContent = '';
  let aiMsgIndex  = -1;

  try {
    const resp = await fetch(DS_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages,
        stream: true,
        max_tokens: 2000,
        temperature: 1.0
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    removeTypingIndicator();

    const aiMsg = { role: 'assistant', content: '', ts: new Date().toISOString() };
    note.thread.push(aiMsg);
    aiMsgIndex = note.thread.length - 1;
    renderThread(note);
    scrollThread();

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const chunk  = parsed.choices?.[0]?.delta?.content;
          if (chunk) {
            fullContent += chunk;
            note.thread[aiMsgIndex].content = fullContent;
            const bubbles    = document.querySelectorAll('#threadView .msg-bubble');
            const lastBubble = bubbles[bubbles.length - 1];
            if (lastBubble) {
              lastBubble.textContent = fullContent;
              lastBubble.classList.add('streaming-cursor');
            }
            scrollThread();
          }
        } catch(_) {}
      }
    }

    if (aiMsgIndex >= 0) {
      note.thread[aiMsgIndex].content = fullContent;
      note.thread[aiMsgIndex].ts      = new Date().toISOString();
    }
    isStreaming = false;
    renderThread(note);
    await dbPut(note);
    renderNotesList();
    scheduleSyncCloud();

  } catch(e) {
    removeTypingIndicator();
    isStreaming = false;
    if (aiMsgIndex >= 0) note.thread.splice(aiMsgIndex, 1);
    showToast('AI 回复失败: ' + e.message);
    console.error(e);
  } finally {
    isStreaming = false;
    setReplyDisabled(false);
    document.getElementById('sendBtn').disabled = false;
    scrollThread();
  }
}

// ===== DELETE =====
function askDelete(e, id) {
  e.stopPropagation();
  deleteTargetId = id;
  openModal('deleteModal');
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  await dbDelete(deleteTargetId);
  notes = notes.filter(n => n.id !== deleteTargetId);
  if (currentId === deleteTargetId) {
    currentId = null;
    document.getElementById('rightEmpty').style.display = '';
    document.getElementById('convoView').classList.remove('visible');
  }
  deleteTargetId = null;
  closeModal('deleteModal');
  renderNotesList();
  scheduleSyncCloud();
  showToast('已删除');
}

// ===== FILTER TABS =====
function initFilterTabs() {
  document.getElementById('typeTabs').addEventListener('click', e => {
    const btn = e.target.closest('.type-tab');
    if (!btn) return;
    filterType = btn.dataset.type;
    document.querySelectorAll('.type-tab').forEach(b => b.classList.toggle('active', b === btn));
    renderNotesList();
  });
}

// ===== COMPOSE TABS =====
function initComposeTabs() {
  document.getElementById('composeTabs').addEventListener('click', e => {
    const btn = e.target.closest('.compose-type');
    if (!btn) return;
    composeType = btn.dataset.type;
    document.querySelectorAll('.compose-type').forEach(b => b.classList.toggle('active', b === btn));
  });
}

// ===== SETTINGS =====
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    document.getElementById('apiKeyError').style.display = 'block';
    document.getElementById('apiKeyError').textContent = '请输入 API Key';
    return;
  }
  localStorage.setItem('deepseek_api_key', key);
  closeModal('settingsModal');
  showToast('API Key 已保存');
}

function openSettingsModal() {
  const key = localStorage.getItem('deepseek_api_key') || '';
  document.getElementById('apiKeyInput').value = key ? key.slice(0,8) + '...' : '';
  document.getElementById('apiKeyError').style.display = 'none';
  openModal('settingsModal');
}

// ===== SUPABASE =====
async function sbFetch(path, opts={}) {
  const headers = {
    'apikey':        SB_KEY,
    'Authorization': `Bearer ${sbSession?.access_token || SB_KEY}`,
    'Content-Type':  'application/json',
    ...(opts.headers||{})
  };
  const res = await fetch(SB_URL + path, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function sbLogin(email, password) {
  const data = await sbFetch('/auth/v1/token?grant_type=password', {
    method: 'POST',
    body: JSON.stringify({ email, password })
  });
  sbSession = data;
  localStorage.setItem('sb_session', JSON.stringify(data));
  return data;
}

async function sbSignup(email, password) {
  const data = await sbFetch('/auth/v1/signup', {
    method: 'POST',
    body: JSON.stringify({ email, password })
  });
  if (data.access_token) {
    sbSession = data;
    localStorage.setItem('sb_session', JSON.stringify(data));
  }
  return data;
}

async function sbLogout() {
  await sbFetch('/auth/v1/logout', { method: 'POST' }).catch(()=>{});
  sbSession = null;
  localStorage.removeItem('sb_session');
}

async function syncToCloud() {
  if (!sbSession) return;
  document.getElementById('syncStatus').textContent = '同步中…';
  document.getElementById('syncStatus').className   = 'sync-status syncing';
  try {
    await sbFetch('/rest/v1/sync_data', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({
        user_id:    sbSession.user.id,
        app_name:   'thinknote',
        data:       { notes },
        updated_at: new Date().toISOString()
      })
    });
    document.getElementById('syncStatus').textContent = '已同步 ✓';
    document.getElementById('syncStatus').className   = 'sync-status ok';
  } catch(e) {
    document.getElementById('syncStatus').textContent = '同步失败';
    document.getElementById('syncStatus').className   = 'sync-status';
    console.error('sync error', e);
  }
}

async function loadFromCloud() {
  if (!sbSession) return;
  try {
    const data = await sbFetch(`/rest/v1/sync_data?user_id=eq.${sbSession.user.id}&app_name=eq.thinknote`);
    if (data && data[0]?.data?.notes?.length) {
      const cloud = data[0].data.notes;
      // Merge: cloud wins, add any local-only notes
      const cloudIds = new Set(cloud.map(n=>n.id));
      const localOnly = notes.filter(n=>!cloudIds.has(n.id));
      notes = [...cloud, ...localOnly];
      // Save all to local DB
      for (const n of notes) await dbPut(n);
      renderNotesList();
      if (currentId) {
        const cur = notes.find(n=>n.id===currentId);
        if (cur) { renderThread(cur); }
      }
    }
  } catch(e) { console.error('cloud load', e); }
}

function scheduleSyncCloud() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, SYNC_DELAY);
}

// ===== AUTH MODAL =====
let authMode = 'login';

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  if (authMode === 'signup') {
    document.getElementById('authTitle').textContent        = '👤 注册账号';
    document.getElementById('authSub').textContent          = '创建账号后即可同步笔记到云端';
    document.getElementById('authToggleLink').textContent   = '已有账号？登录';
    document.getElementById('authSubmitBtn').textContent    = '注册';
  } else {
    document.getElementById('authTitle').textContent        = '👤 登录账号';
    document.getElementById('authSub').textContent          = '登录后笔记将自动同步到云端，多设备共享';
    document.getElementById('authToggleLink').textContent   = '没有账号？注册';
    document.getElementById('authSubmitBtn').textContent    = '登录';
  }
  document.getElementById('authError').style.display = 'none';
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl    = document.getElementById('authError');

  if (!email || !password) {
    errEl.textContent = '请填写邮箱和密码';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true;
  btn.textContent = '请稍候…';
  errEl.style.display = 'none';

  try {
    if (authMode === 'login') {
      await sbLogin(email, password);
    } else {
      await sbSignup(email, password);
    }
    closeModal('authModal');
    updateAuthBtn();
    await loadFromCloud();
    scheduleSyncCloud();
    showToast(authMode === 'login' ? '登录成功' : '注册成功');
  } catch(e) {
    errEl.textContent   = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = authMode === 'login' ? '登录' : '注册';
  }
}

async function logout() {
  await sbLogout();
  closeModal('authModal');
  updateAuthBtn();
  showToast('已退出登录');
}

function updateAuthBtn() {
  const btn = document.getElementById('authBtn');
  if (sbSession) {
    btn.title = '已登录: ' + sbSession.user.email;
    btn.classList.add('active');
    document.getElementById('syncStatus').textContent = '云同步';
    document.getElementById('syncStatus').className   = 'sync-status ok';
    document.getElementById('logoutDivider').style.display  = '';
    document.getElementById('logoutSection').style.display  = '';
    document.getElementById('authToggleLink').style.display = 'none';
  } else {
    btn.title = '登录账号';
    btn.classList.remove('active');
    document.getElementById('syncStatus').textContent = '本地';
    document.getElementById('syncStatus').className   = 'sync-status';
    document.getElementById('logoutDivider').style.display  = 'none';
    document.getElementById('logoutSection').style.display  = 'none';
    document.getElementById('authToggleLink').style.display = '';
  }
}

function openAuthModal() {
  if (sbSession) {
    document.getElementById('authTitle').textContent = '👤 已登录';
    document.getElementById('authSub').textContent   = sbSession.user.email;
    document.getElementById('authEmail').style.display = 'none';
    document.getElementById('authPassword').style.display = 'none';
    document.querySelector('label[for="authEmail"]')?.remove?.();
    document.querySelectorAll('.modal-label').forEach(l=>l.style.display='none');
    document.getElementById('authSubmitBtn').style.display = 'none';
    document.getElementById('authToggleLink').style.display = 'none';
    document.getElementById('logoutDivider').style.display = '';
    document.getElementById('logoutSection').style.display = '';
  } else {
    document.getElementById('authEmail').style.display    = '';
    document.getElementById('authPassword').style.display = '';
    document.querySelectorAll('.modal-label').forEach(l=>l.style.display='');
    document.getElementById('authSubmitBtn').style.display = '';
    authMode = 'login';
    document.getElementById('authTitle').textContent       = '👤 登录账号';
    document.getElementById('authSub').textContent         = '登录后笔记将自动同步到云端，多设备共享';
    document.getElementById('authToggleLink').textContent  = '没有账号？注册';
    document.getElementById('authSubmitBtn').textContent   = '登录';
  }
  openModal('authModal');
}

// ===== MODAL HELPERS =====
function openModal(id) {
  document.getElementById(id).classList.add('visible');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('visible');
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === document.getElementById(id)) closeModal(id);
  }, { once: true });
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== MOBILE =====
function closeMobile() {
  document.getElementById('rightPane').classList.remove('mobile-open');
}

// ===== AUTO-RESIZE TEXTAREA =====
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, parseInt(el.style.maxHeight||'999')) + 'px';
}

// ===== INIT =====
async function init() {
  await initDB();

  // Load local notes
  const raw = await dbAll();
  notes = raw.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  renderNotesList();

  // Restore session
  const savedSession = localStorage.getItem('sb_session');
  if (savedSession) {
    try {
      sbSession = JSON.parse(savedSession);
      // Refresh session
      const refreshed = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        body: JSON.stringify({ refresh_token: sbSession.refresh_token })
      }).catch(() => null);
      if (refreshed?.access_token) {
        sbSession = refreshed;
        localStorage.setItem('sb_session', JSON.stringify(refreshed));
      }
      updateAuthBtn();
      await loadFromCloud();
    } catch(e) {
      sbSession = null;
      localStorage.removeItem('sb_session');
    }
  }

  // Select first note if exists
  if (notes.length > 0) {
    selectNote(notes[0].id);
  }

  // Event listeners
  initFilterTabs();
  initComposeTabs();

  document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
  document.getElementById('authBtn').addEventListener('click', openAuthModal);

  document.getElementById('sendBtn').addEventListener('click', addNote);
  document.getElementById('composeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addNote();
  });
  document.getElementById('composeInput').addEventListener('input', function() { autoResize(this); });

  document.getElementById('replyBtn').addEventListener('click', sendReply);
  document.getElementById('replyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendReply();
  });
  document.getElementById('replyInput').addEventListener('input', function() { autoResize(this); });

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('visible');
    });
  });
}

init().catch(console.error);
</script>
