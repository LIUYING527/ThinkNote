<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ThinkNote</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <style>
    :root {
      --bg:        #f0ede8;
      --page:      #ffffff;
      --sb-bg:     #f7f6f3;
      --border:    #e5e1da;
      --border-h:  #c9c4bc;
      --accent:    #4f46e5;
      --accent-l:  #818cf8;
      --accent-s:  #eef2ff;
      --t1: #111827; --t2: #374151; --t3: #6b7280; --t4: #9ca3af;
      --sh-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --sh:    0 4px 12px rgba(0,0,0,.09);
      --thought: #5b5fcf; --thought-bg: #eef2ff; --thought-br: #c7d2fe;
      --task:    #059669; --task-bg:    #ecfdf5; --task-br:    #a7f3d0;
      --idea:    #d97706; --idea-bg:    #fffbeb; --idea-br:    #fde68a;
      --plan:    #2563eb; --plan-bg:    #eff6ff; --plan-br:    #bfdbfe;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Helvetica Neue',sans-serif;
      background:var(--bg);color:var(--t1);
      display:flex;flex-direction:column;height:100dvh;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .hdr{
      display:flex;align-items:center;height:52px;
      padding:0 16px;gap:10px;
      background:var(--page);
      border-bottom:1px solid var(--border);
      box-shadow:var(--sh-sm);
      flex-shrink:0;z-index:20;
    }
    .logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .logo-svg{flex-shrink:0;}
    .logo-name{
      font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.3px;
    }
    .logo-name span{color:var(--accent);}
    .hdr-sep{width:1px;height:20px;background:var(--border);}
    .type-filters{display:flex;gap:4px;overflow-x:auto;flex:1;}
    .type-filter{
      padding:4px 11px;border-radius:18px;
      border:1px solid transparent;background:transparent;
      color:var(--t3);font-size:12.5px;cursor:pointer;white-space:nowrap;
      transition:all .15s;
    }
    .type-filter:hover{color:var(--t2);background:var(--bg);}
    .type-filter.active{background:var(--accent-s);border-color:var(--accent-l);color:var(--accent);font-weight:500;}
    .hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .sync-pill{
      font-size:11px;padding:3px 9px;border-radius:10px;
      background:var(--bg);border:1px solid var(--border);color:var(--t4);
    }
    .sync-pill.ok{color:#059669;border-color:#a7f3d0;background:#ecfdf5;}
    .sync-pill.busy{color:var(--accent-l);}
    .hbtn{
      width:32px;height:32px;border-radius:8px;
      border:1px solid var(--border);background:var(--page);
      color:var(--t3);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;transition:all .15s;
    }
    .hbtn:hover{background:var(--bg);border-color:var(--border-h);color:var(--t2);}
    .hbtn.on{background:var(--accent-s);border-color:var(--accent-l);color:var(--accent);}

    /* ─── MAIN SPLIT ──────────────────────────────────── */
    .main{display:flex;flex:1;overflow:hidden;position:relative;}

    /* Canvas overlay for connector lines */
    #connCanvas{
      position:absolute;top:0;left:0;
      pointer-events:none;z-index:8;
    }

    /* ─── LEFT: DOCUMENT PANE ─────────────────────────── */
    .doc-pane{
      width:56%;min-width:280px;
      display:flex;flex-direction:column;
      background:var(--bg);
    }
    .doc-scroll{
      flex:1;overflow-y:auto;
      padding:14px 14px 0;
      display:flex;flex-direction:column;gap:9px;
    }

    .note-entry{
      background:var(--page);
      border-radius:10px;
      border:1px solid var(--border);
      padding:14px 16px 12px 20px;
      cursor:pointer;
      transition:border-color .18s,box-shadow .18s;
      position:relative;
      box-shadow:var(--sh-sm);
    }
    .note-entry::before{
      content:'';position:absolute;left:0;top:10px;bottom:10px;
      width:3px;border-radius:3px;
    }
    .note-entry[data-type="thought"]::before{background:var(--thought);}
    .note-entry[data-type="task"]::before   {background:var(--task);}
    .note-entry[data-type="idea"]::before   {background:var(--idea);}
    .note-entry[data-type="plan"]::before   {background:var(--plan);}
    .note-entry:hover{border-color:var(--border-h);box-shadow:var(--sh);}
    .note-entry.sel{border-color:var(--accent-l);box-shadow:0 0 0 2px rgba(99,102,241,.12),var(--sh);}

    .ne-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .ne-badge{
      font-size:11px;font-weight:500;padding:2px 7px;border-radius:8px;
    }
    .ne-badge.thought{background:var(--thought-bg);color:var(--thought);}
    .ne-badge.task   {background:var(--task-bg);   color:var(--task);}
    .ne-badge.idea   {background:var(--idea-bg);   color:var(--idea);}
    .ne-badge.plan   {background:var(--plan-bg);   color:var(--plan);}
    .ne-time{font-size:11px;color:var(--t4);margin-left:auto;}
    .ne-content{
      font-size:14px;color:var(--t2);line-height:1.7;
      white-space:pre-wrap;word-break:break-word;
    }
    .ne-foot{display:flex;align-items:center;margin-top:8px;gap:6px;}
    .ne-anno-pill{
      font-size:11px;color:var(--t4);
      display:flex;align-items:center;gap:3px;
    }
    .ne-del{
      margin-left:auto;padding:2px 6px;border-radius:6px;
      border:none;background:transparent;color:var(--t4);
      cursor:pointer;font-size:12px;opacity:0;transition:all .15s;
    }
    .note-entry:hover .ne-del{opacity:1;}
    .ne-del:hover{background:#fef2f2;color:#ef4444;}

    .empty-doc{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:40px 24px;text-align:center;gap:10px;
    }
    .empty-doc svg{opacity:.25;}
    .empty-doc p{font-size:13.5px;color:var(--t3);line-height:1.65;}

    /* ─── COMPOSE AREA ─────────────────────────────────── */
    .compose{
      padding:12px 14px;
      background:var(--page);
      border-top:1px solid var(--border);
      flex-shrink:0;
    }
    .c-types{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
    .c-type{
      padding:3px 9px;border-radius:12px;font-size:12px;
      border:1px solid var(--border);background:transparent;
      color:var(--t3);cursor:pointer;transition:all .15s;
    }
    .c-type:hover{color:var(--t2);}
    .c-type.active[data-type="thought"]{background:var(--thought-bg);border-color:var(--thought-br);color:var(--thought);font-weight:500;}
    .c-type.active[data-type="task"]   {background:var(--task-bg);   border-color:var(--task-br);   color:var(--task);   font-weight:500;}
    .c-type.active[data-type="idea"]   {background:var(--idea-bg);   border-color:var(--idea-br);   color:var(--idea);   font-weight:500;}
    .c-type.active[data-type="plan"]   {background:var(--plan-bg);   border-color:var(--plan-br);   color:var(--plan);   font-weight:500;}
    .c-row{display:flex;gap:8px;align-items:flex-end;}
    .c-textarea{
      flex:1;min-height:60px;max-height:120px;
      padding:10px 12px;border-radius:8px;
      border:1px solid var(--border);background:var(--bg);
      color:var(--t1);font-size:14px;line-height:1.6;
      resize:none;outline:none;font-family:inherit;
      transition:border-color .18s,background .18s;
    }
    .c-textarea:focus{border-color:var(--accent-l);background:var(--page);}
    .c-textarea::placeholder{color:var(--t4);}
    .c-send{
      padding:10px 18px;border-radius:8px;border:none;
      background:var(--accent);color:#fff;
      font-size:13px;font-weight:500;cursor:pointer;
      transition:all .18s;flex-shrink:0;
    }
    .c-send:hover:not(:disabled){background:#4338ca;transform:translateY(-1px);}
    .c-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .c-hint{font-size:11px;color:var(--t4);margin-top:5px;}

    /* ─── GUTTER (resizable handle) ─────────────────── */
    .gutter{
      width:28px;flex-shrink:0;
      background:var(--bg);
      z-index:1;
      cursor:col-resize;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .gutter::after{
      content:'';width:3px;height:36px;border-radius:2px;
      background:var(--border);transition:background .15s;
    }
    .gutter:hover::after,.gutter.dragging::after{background:var(--accent-l);}
    .gutter:hover{background:var(--accent-s);}

    /* ─── MOBILE TAB BAR ─────────────────────────────── */
    .mobile-tab-bar{
      display:none;flex-shrink:0;
      background:var(--page);border-bottom:1px solid var(--border);
      padding:0 8px;
    }
    .mob-tab{
      flex:1;padding:10px 0;
      font-size:13.5px;font-weight:500;
      border:none;border-bottom:2.5px solid transparent;
      background:transparent;color:var(--t3);
      cursor:pointer;transition:all .15s;
    }
    .mob-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* Mobile back button in anno pane header */
    .mob-back-btn{
      display:none;
      padding:3px 10px;border-radius:6px;
      border:1px solid var(--border);background:transparent;
      color:var(--accent);font-size:12px;cursor:pointer;
      margin-right:8px;flex-shrink:0;
      transition:all .15s;
    }
    .mob-back-btn:hover{background:var(--accent-s);}

    @media(max-width:767px){
      .mobile-tab-bar{display:flex;}
      .main{display:block;}
      .doc-pane{width:100% !important;height:100%;flex:none;}
      .doc-pane.mob-hidden{display:none !important;}
      .anno-pane{width:100% !important;height:100%;flex:none;border-left:none;}
      .anno-pane.mob-hidden{display:none !important;}
      .gutter{display:none !important;}
      #connCanvas{display:none !important;}
      .c-hint{display:none;}
      .sync-pill{display:none;}
      .hdr-sep{display:none;}
      .mob-back-btn{display:inline-flex;align-items:center;}
      .anno-pane-hdr{display:flex;align-items:center;}
      /* Hide in-card reply on mobile — use the bottom bar instead */
      .reply-input-wrap{display:none !important;}
      /* Show the bottom reply bar on mobile */
      .anno-reply-bar{display:flex !important;}
    }

    /* ─── BOTTOM REPLY BAR (mobile) ─────────────────── */
    .anno-reply-bar{
      display:none;          /* hidden on desktop */
      flex-direction:column;
      flex-shrink:0;
      background:var(--page);
      border-top:2px solid var(--border);
      padding:10px 12px 12px;
      gap:6px;
    }
    .arb-ctx{
      font-size:11.5px;color:var(--t3);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .arb-ctx strong{color:var(--t2);font-weight:600;}
    .arb-row{display:flex;gap:8px;align-items:flex-end;}
    .arb-ta{
      flex:1;min-height:44px;max-height:110px;
      padding:11px 13px;border-radius:10px;
      border:1.5px solid var(--border);background:var(--bg);
      color:var(--t1);font-size:14px;line-height:1.5;
      resize:none;outline:none;font-family:inherit;
      -webkit-appearance:none;appearance:none;
      transition:border-color .18s,background .18s;
    }
    .arb-ta:focus{border-color:var(--accent-l);background:var(--page);}
    .arb-ta::placeholder{color:var(--t4);}
    .arb-ta:disabled{opacity:.5;cursor:not-allowed;}
    .arb-btn{
      width:44px;height:44px;border-radius:10px;border:none;
      background:var(--accent);color:#fff;
      font-size:20px;line-height:1;
      cursor:pointer;transition:background .15s;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .arb-btn:disabled{opacity:.35;cursor:not-allowed;}
    .arb-btn:not(:disabled):active{background:#4338ca;}
    .arb-stop-row{display:none;}
    .arb-stop-btn{
      width:100%;padding:11px 0;border-radius:10px;
      border:1.5px solid #ef4444;background:transparent;
      color:#ef4444;font-size:14px;font-weight:500;
      cursor:pointer;transition:all .15s;
    }
    .arb-stop-btn:active{background:#fef2f2;}
    .ac-continue-btn{color:var(--accent);border-color:var(--accent-l);background:var(--accent-s);}

    /* ─── START / RETRY buttons inside idle/stuck anno-card ── */
    .ac-start-btn{
      display:block;width:100%;padding:10px 0;
      border-radius:9px;border:1.5px solid var(--accent-l);
      background:var(--accent-s);color:var(--accent);
      font-size:13.5px;font-weight:500;cursor:pointer;
      transition:all .15s;
    }
    .ac-start-btn:hover{background:var(--accent);color:#fff;}
    /* Reply bar start row */
    .arb-start-row{display:none;}
    .arb-start-btn{
      width:100%;padding:12px 0;border-radius:10px;
      border:1.5px solid var(--accent-l);background:var(--accent-s);
      color:var(--accent);font-size:14px;font-weight:500;
      cursor:pointer;transition:all .15s;
    }
    .arb-start-btn:active{background:var(--accent);color:#fff;}

    /* ─── RIGHT: ANNOTATION PANE ─────────────────────── */
    .anno-pane{
      flex:1;min-width:240px;
      display:flex;flex-direction:column;
      background:var(--sb-bg);
      border-left:1px solid var(--border);
    }
    .anno-pane-hdr{
      padding:11px 14px;
      font-size:11.5px;font-weight:600;
      color:var(--t4);text-transform:uppercase;letter-spacing:.6px;
      border-bottom:1px solid var(--border);
      background:var(--page);flex-shrink:0;
    }
    .anno-scroll{
      flex:1;overflow-y:auto;
      padding:12px;
      display:flex;flex-direction:column;gap:10px;
    }

    /* Annotation card */
    .anno-card{
      background:var(--page);
      border-radius:10px;
      border:1px solid var(--border);
      overflow:hidden;
      box-shadow:var(--sh-sm);
      transition:border-color .18s,box-shadow .18s;
      cursor:pointer;
    }
    .anno-card.sel{border-color:var(--accent-l);box-shadow:0 0 0 2px rgba(99,102,241,.10),var(--sh);}

    .ac-hdr{
      display:flex;align-items:center;gap:8px;
      padding:9px 13px;
      border-bottom:1px solid var(--border);
      background:var(--sb-bg);
    }
    .ac-avatar{
      width:22px;height:22px;border-radius:7px;
      background:var(--accent-s);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;flex-shrink:0;
    }
    .ac-title{font-size:12px;font-weight:600;color:var(--t2);}
    .ac-status{
      margin-left:auto;font-size:11px;color:var(--t3);
      display:flex;align-items:center;gap:5px;
    }

    /* Research/thinking animation */
    .research-anim{
      padding:12px 13px;
      display:flex;flex-direction:column;gap:8px;
    }
    .ra-step{
      display:flex;align-items:center;gap:8px;
      font-size:12.5px;color:var(--t3);opacity:0;
      transition:opacity .4s;
    }
    .ra-step.visible{opacity:1;}
    .ra-step.done{color:var(--t4);text-decoration:line-through;opacity:.5;}
    .ra-icon{font-size:14px;}
    .ra-spinner{
      width:14px;height:14px;border-radius:50%;
      border:2px solid var(--border);
      border-top-color:var(--accent-l);
      animation:spin .8s linear infinite;
      flex-shrink:0;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .ac-body{padding:12px 13px;}
    .ac-text{
      font-size:13.5px;line-height:1.8;
      color:var(--t2);
      white-space:pre-wrap;word-break:break-word;
    }
    .streaming-cur::after{
      content:'▋';animation:bl .6s infinite;
      color:var(--accent);font-size:.75em;vertical-align:middle;
    }
    @keyframes bl{50%{opacity:0;}}

    /* Reply thread inside annotation */
    .reply-thread{
      border-top:1px solid var(--border);
      padding:10px 13px;
      display:flex;flex-direction:column;gap:10px;
    }
    .thread-row{display:flex;gap:8px;}
    .thread-ava{
      width:18px;height:18px;border-radius:5px;
      flex-shrink:0;margin-top:2px;
      display:flex;align-items:center;justify-content:center;font-size:10px;
    }
    .thread-ava.ai  {background:var(--accent-s);color:var(--accent);}
    .thread-ava.usr {background:#f3f4f6;color:var(--t2);}
    .thread-text{font-size:13px;line-height:1.7;color:var(--t2);flex:1;white-space:pre-wrap;word-break:break-word;}

    /* Reply input area */
    .reply-input-wrap{
      border-top:1px solid var(--border);
      padding:10px 13px;
    }
    .ri-row{display:flex;gap:7px;align-items:flex-end;}
    .ri-textarea{
      flex:1;min-height:44px;max-height:120px;
      padding:10px 10px;border-radius:7px;
      border:1px solid var(--border);background:var(--bg);
      color:var(--t1);font-size:13px;line-height:1.55;
      resize:none;outline:none;font-family:inherit;
      transition:border-color .18s,background .18s;
      cursor:text;
    }
    .ri-textarea:focus{border-color:var(--accent-l);background:var(--page);}
    .ri-textarea::placeholder{color:var(--t4);}
    .ri-btn{
      padding:7px 12px;border-radius:7px;border:none;
      background:var(--accent);color:#fff;
      font-size:12px;font-weight:500;cursor:pointer;
      transition:all .15s;flex-shrink:0;
    }
    .ri-btn:hover:not(:disabled){background:#4338ca;}
    .ri-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* ─── MODAL ──────────────────────────────────────── */
    .mo{
      position:fixed;inset:0;background:rgba(15,15,20,.45);
      backdrop-filter:blur(5px);
      display:none;align-items:center;justify-content:center;
      z-index:300;padding:20px;
    }
    .mo.vis{display:flex;}
    .mo-box{
      background:var(--page);border:1px solid var(--border);
      border-radius:14px;padding:24px;
      width:400px;max-width:100%;
      box-shadow:0 24px 64px rgba(0,0,0,.15);
    }
    .mo-title{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:5px;}
    .mo-sub  {font-size:13px;color:var(--t3);margin-bottom:18px;line-height:1.5;}
    .mo-label{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px;}
    .mo-input{
      width:100%;padding:9px 12px;border-radius:8px;
      border:1px solid var(--border);background:var(--bg);
      color:var(--t1);font-size:13.5px;outline:none;
      font-family:inherit;margin-bottom:12px;transition:border-color .18s;
    }
    .mo-input:focus{border-color:var(--accent-l);}
    .mo-err{font-size:12px;color:#ef4444;margin-top:-6px;margin-bottom:10px;display:none;}
    .mo-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;}
    .mo-sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
    .mo-link{font-size:12px;color:var(--accent);cursor:pointer;}
    .mo-link:hover{text-decoration:underline;}
    .btn-cancel{
      padding:7px 16px;border-radius:8px;
      border:1px solid var(--border);background:transparent;
      color:var(--t2);font-size:13px;cursor:pointer;transition:background .15s;
    }
    .btn-cancel:hover{background:var(--bg);}
    .btn-ok{
      padding:7px 18px;border-radius:8px;border:none;
      background:var(--accent);color:#fff;
      font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;
    }
    .btn-ok:hover{background:#4338ca;}
    .btn-danger{
      padding:7px 18px;border-radius:8px;border:none;
      background:#ef4444;color:#fff;
      font-size:13px;font-weight:500;cursor:pointer;
    }
    .btn-danger:hover{background:#dc2626;}

    /* ─── TOAST ─────────────────────────────────────── */
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(70px);
      background:var(--t1);color:#fff;
      padding:9px 20px;border-radius:20px;
      font-size:13px;z-index:500;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* ─── SCROLLBAR ─────────────────────────────────── */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px;}

    /* ─── ANNO CARD: header is the clickable zone ───── */
    .anno-card{cursor:default;}
    .ac-hdr{cursor:pointer;user-select:none;-webkit-user-select:none;}
    .ac-hdr:hover{background:var(--border);transition:background .15s;}

    /* ─── ANNO ACTION BUTTONS ────────────────────────── */
    .ac-action-btn{
      padding:3px 7px;border-radius:6px;
      border:1px solid transparent;background:transparent;
      color:var(--t4);font-size:12px;cursor:pointer;
      transition:all .15s;flex-shrink:0;line-height:1;
    }

'use strict';

// ═══════════════════════════════════════════════════════

function initDB() {
  return new Promise((res,rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('notes')) {
        d.createObjectStore('notes', { keyPath:'id' });
      }
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror   = () => rej(r.error);
  });
}
function dbAll() {
  return new Promise((res,rej)=>{
    const req = db.transaction('notes','readonly').objectStore('notes').getAll();
    req.onsuccess = ()=>res(req.result);
    req.onerror   = ()=>rej(req.error);

}
function dbPut(note) {
  return new Promise((res,rej)=>{
    const req = db.transaction('notes','readwrite').objectStore('notes').put(note);
    req.onsuccess = ()=>res();
    req.onerror   = ()=>rej(req.error);

}
function dbDel(id) {

// ═══════════════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════════════
function uid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>
    (c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function delay(ms, signal) {
  return new Promise((res, rej) => {
    const t = setTimeout(res, ms);
    signal?.addEventListener('abort', () => {
      clearTimeout(t);
      rej(new DOMException('Aborted', 'AbortError'));
    }, { once: true });
  });
}
function fmtTime(iso) {
  const d=new Date(iso), now=new Date(), diff=now-d;
  if(diff<60000)    return '刚刚';
  if(diff<3600000)  return Math.floor(diff/60000)+'分钟前';
  if(diff<86400000) return Math.floor(diff/3600000)+'小时前';
  if(diff<604800000)return Math.floor(diff/86400000)+'天前';
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtFull(iso) {
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,200)+'px';
}

// ─── MARKDOWN RENDERER ──────────────────────────────────
function mdToHtml(raw) {
  if (!raw) return '';
  function inlineFmt(t) {
    return t
      .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>');
  }
  const lines = raw.split('\n');
  let out = '', inUL = false;
  for (const ln of lines) {
    const e = esc(ln);
    const h3 = e.match(/^###\s+(.+)/), h2 = e.match(/^##\s+(.+)/), h1 = e.match(/^#\s+(.+)/);
    if (h1||h2||h3) {
      if (inUL){out+='</ul>';inUL=false;}
      const lv=h3?3:h2?2:1; const m=h3||h2||h1;
      out+=`<div class="md-h${lv}">${inlineFmt(m[1])}</div>`; continue;
    }
    const li = e.match(/^[-*•]\s+(.+)/);
    const oli = e.match(/^(\d+)\.\s+(.+)/);
    if (li) { if(!inUL){out+='<ul class="md-ul">';inUL=true;} out+=`<li>${inlineFmt(li[1])}</li>`; continue; }
    if (oli){ if(inUL){out+='</ul>';inUL=false;} out+=`<div class="md-oli">${oli[1]}. ${inlineFmt(oli[2])}</div>`; continue; }
    if (inUL){out+='</ul>';inUL=false;}
    if (!e.trim()){ out+='<div class="md-gap"></div>'; continue; }
    out+=`<div>${inlineFmt(e)}</div>`;
  }
  if (inUL) out+='</ul>';
  return out;
}

// ═══════════════════════════════════════════════════════
//  CANVAS CONNECTOR LINES
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('connCanvas');
const ctx    = canvas.getContext('2d');

function drawConnectors() {
  const main = document.getElementById('mainContainer');
  const mr   = main.getBoundingClientRect();
  canvas.width  = mr.width;
  canvas.height = mr.height;
  canvas.style.width  = mr.width  + 'px';
  canvas.style.height = mr.height + 'px';
  ctx.clearRect(0,0,canvas.width,canvas.height);

  notes.forEach(note => {
    if (filterType !== 'all' && note.type !== filterType) return;
    const noteEl = document.querySelector(`.note-entry[data-id="${note.id}"]`);
    const annoEl = document.querySelector(`.anno-card[data-id="${note.id}"]`);
    if (!noteEl || !annoEl) return;

    const nr = noteEl.getBoundingClientRect();
    const ar = annoEl.getBoundingClientRect();
    if (nr.bottom < mr.top || nr.top > mr.bottom) return;
    if (ar.bottom < mr.top || ar.top > mr.bottom) return;

    const x1 = nr.right  - mr.left;
    const y1 = nr.top  + nr.height/2  - mr.top;
    const x2 = ar.left  - mr.left;
    const y2 = ar.top  + ar.height/2  - mr.top;

    const isActive = note.id === selId;
    const col      = TYPE_COLORS[note.type] || '#6366f1';

    ctx.strokeStyle = isActive ? col : '#d1cdc7';
    ctx.lineWidth   = isActive ? 1.5 : 1;
    ctx.setLineDash( isActive ? [] : [4,4] );

    // Bezier curve
    const cpx1 = x1 + (x2-x1)*0.45;
    const cpx2 = x1 + (x2-x1)*0.55;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.bezierCurveTo(cpx1,y1, cpx2,y2, x2,y2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Endpoint dots
    ctx.fillStyle = isActive ? col : '#c9c4bc';
    [{ x:x1, y:y1 }, { x:x2, y:y2 }].forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, isActive?3.5:2.5, 0, Math.PI*2);
      ctx.fill();
    });
  });
}

function schedRedraw() {
  if (isMobile()) return;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(()=>{ drawConnectors(); rafId=null; });

function visible(notes) {
  if (filterType === 'all') return notes;
  return notes.filter(n => n.type === filterType);
}
function sorted() {
  return [...notes].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
}

function renderAll() {
  const list = visible(sorted());
  renderNotes(list);
  renderAnnos(list);
  updateReplyBar();
  setTimeout(schedRedraw, 100);
}

function renderNotes(list) {
  const el = document.getElementById('docScroll');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-doc">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect x="10" y="6" width="32" height="40" rx="5" fill="#e5e1da"/>

        <rect x="15" y="19" width="22" height="2" rx="1" fill="#c9c4bc"/>
        <rect x="15" y="25" width="14" height="2" rx="1" fill="#c9c4bc"/>
        <rect x="15" y="31" width="20" height="2" rx="1" fill="#c9c4bc"/>
      </svg>
      <p>在下方写下你的第一条笔记<br>AI 将自动进行深度批注</p>
    </div>`;

  }
  el.innerHTML = list.map(n => {

    return `<div class="note-entry${n.id===selId?' sel':''}" data-id="${n.id}" data-type="${n.type}" onclick="selNote('${n.id}',true)">
      <div class="ne-top">
        <span class="ne-badge ${n.type}">${badge}</span>
        <span class="ne-time">${fmtFull(n.created_at)}</span>
      </div>
      <div class="ne-content">${esc(n.content)}</div>
      <div class="ne-foot">
        <span class="ne-anno-pill">${hasAnno ? '🤖' : '⏳'} ${annoInfo}</span>
        <button class="ne-del" onclick="askDel(event,'${n.id}')" title="删除">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function renderAnnos(list) {
  const el = document.getElementById('annoScroll');
  el.innerHTML = list.map(n => {
    const isActive = n.id === selId;
    const col      = TYPE_COLORS[n.type] || '#6366f1';

    let bodyHtml = '';

    // Check streaming state
    const streamingThis = streaming && n.id === selId;

    // Detect stuck state: status says in-progress but nothing is actually streaming
    const isStuck = !streamingThis && !streaming &&
      (n._annoStatus === 'researching' || n._annoStatus === 'thinking' || n._annoStatus === 'streaming');

    if (!n._annoStatus || n._annoStatus === 'idle') {
      bodyHtml = `<div class="ac-body">
        <div class="ac-text" style="color:var(--t4);font-size:12.5px;font-style:italic;margin-bottom:12px;">批注尚未生成</div>
        <button class="ac-start-btn" onclick="annotate('${n.id}',null);event.stopPropagation()">🚀 立即批注</button>
      </div>`;
    } else if (isStuck) {
      bodyHtml = `<div class="ac-body">
        <div class="ac-text" style="color:var(--t4);font-size:12.5px;font-style:italic;margin-bottom:12px;">批注似乎卡住了</div>
        <button class="ac-start-btn" onclick="forceRetry('${n.id}');event.stopPropagation()">🔄 重新批注</button>
      </div>`;
    } else if (n._annoStatus === 'researching' || n._annoStatus === 'thinking') {
      bodyHtml = buildResearchHtml(n);
    } else if (n._annoStatus === 'streaming' || n._annoStatus === 'done') {
      bodyHtml = buildDoneHtml(n, streamingThis);
    }

    const statusLabel = {
      'idle':        '',
      'researching': '🔍 查阅资料',
      'thinking':    '💭 整理思路',
      'streaming':   '✍️ 批注中',
      'done':        `${fmtTime(n._lastAnnoTime||n.created_at)}`
    }[n._annoStatus || 'idle'] || '';

    const isDone = n._annoStatus === 'done';
    const aiText = n.thread?.find(m=>m.role==='assistant')?.content || '';
    const looksShort = isDone && aiText.length > 0 && aiText.length < 200;
    return `<div class="anno-card${isActive?' sel':''}" data-id="${n.id}">
      <div class="ac-hdr" onclick="selNote('${n.id}',true)">
        <div class="ac-avatar">🤖</div>
        <div class="ac-title">AI 深度批注</div>
        <div class="ac-status">
          ${streamingThis ? '<div class="ra-spinner"></div>' : ''}
          <span>${esc(statusLabel)}</span>
        </div>
        ${isDone && !streamingThis ? `
          ${looksShort ? `<button class="ac-action-btn ac-continue-btn" onclick="continueAnnotate('${n.id}',event)" title="继续生成">▶ 继续</button>` : ''}
          <button class="ac-action-btn" onclick="copyAnno('${n.id}',event)" title="复制批注">📋</button>
          <button class="ac-action-btn" onclick="reAnnotate('${n.id}',event)" title="重新批注">♻️</button>
        ` : ''}
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');

  // Attach reply button listeners
  document.querySelectorAll('.ri-btn').forEach(btn => {
    btn.addEventListener('click', e=>{
      e.stopPropagation();  // prevent bubbling to anno-card onclick
      const id = btn.closest('.anno-card').dataset.id;
      sendReply(id);
    });
  });
  document.querySelectorAll('.ri-textarea').forEach(ta => {
    ta.addEventListener('click', e=>e.stopPropagation());  // prevent annocard onclick → scrollIntoView stealing focus
    ta.addEventListener('keydown', e=>{
      if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)) {
        const id = ta.closest('.anno-card').dataset.id;
        sendReply(id);
      }
    });
    ta.addEventListener('input', ()=>autoResize(ta));
  });
}

function buildResearchHtml(note) {
  const steps = [
    { key:'s1', icon:'🔍', text:'查阅相关领域知识与背景…' },
    { key:'s2', icon:'📊', text:'分析核心要素与潜在影响…' },
    { key:'s3', icon:'💭', text:'整理批注思路与关键洞察…' },
  ];
  return `<div class="research-anim">
    ${steps.map((s,i) => {
      const isVisible = note._resStep >= i;
      const isDone    = note._resStep > i;
      return `<div class="ra-step${isVisible?' visible':''}${isDone?' done':''}" id="rs_${note.id}_${i}">
        <span class="ra-icon">${s.icon}</span>
        ${!isDone ? '<div class="ra-spinner"></div>' : '<span style="font-size:13px">✓</span>'}
        <span>${esc(s.text)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function buildDoneHtml(note, isStreaming) {
  const thread  = note.thread || [];
  const firstAI = thread.find(m=>m.role==='assistant');
  const rest    = firstAI ? thread.slice(thread.indexOf(firstAI)+1) : [];
  const lastMsg = thread[thread.length-1];
  const isLastAI = lastMsg?.role === 'assistant';

  const mainText    = firstAI ? firstAI.content : '';
  const mainStream  = isStreaming && isLastAI && rest.length === 0;

  const html = `<div class="ac-body">
    <div class="ac-text${mainStream?' streaming-cur':''}" id="actext_${note.id}">${mdToHtml(mainText)}</div>
  </div>
  ${rest.length>0 ? `<div class="reply-thread">${
    rest.map(m=>`<div class="thread-row">
      <div class="thread-ava ${m.role==='assistant'?'ai':'usr'}">${m.role==='assistant'?'🤖':'👤'}</div>
      <div class="thread-text${isStreaming&&m===lastMsg&&isLastAI?' streaming-cur':''}">${m.role==='assistant'?mdToHtml(m.content):esc(m.content)}</div>
    </div>`).join('')
  }</div>` : ''}
  <div class="reply-input-wrap">
    <div class="ri-row">
      <textarea class="ri-textarea" placeholder="追问 AI，或补充新思路… Ctrl+Enter"${streaming?' disabled':''}></textarea>
      <button class="ri-btn"${streaming?' disabled':''}>追问 →</button>
    </div>
  </div>`;
  return html;
}

function selNote(id, switchTab = false) {

    el.classList.toggle('sel', el.dataset.id===id));

async function addNote() {
  const ta      = document.getElementById('cInput');
  const content = ta.value.trim();
  if (!content || streaming) return;

  const note = {
    id:          uid(),
    type:        cType,
    content,
    created_at:  new Date().toISOString(),
    thread:      [],
    _annoStatus: 'idle',
    _resStep:    -1,
  };
  notes.unshift(note);
  ta.value = '';

  await annotate(note.id, null);
}

// ═══════════════════════════════════════════════════════
//  ANNOTATE (initial AI annotation with research delay)
// ═══════════════════════════════════════════════════════
async function annotate(noteId, replyContent, continueMode=false) {
  const note = notes.find(n=>n.id===noteId);
  if (!note || streaming) return;

  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) {
    openMo('moSettings');
    showToast('请先设置 API Key');
    return;
  }

  streaming   = true;
  abortCtrl   = new AbortController();
  const signal = abortCtrl.signal;
  document.getElementById('cSend').disabled = true;
  updateReplyBar();

  // If this is a reply, add user message first
  if (replyContent && !continueMode) {
    note.thread.push({ role:'user', content:replyContent, ts:new Date().toISOString() });
    await dbPut(note);
  }

  // ── Research phase (only for initial annotation) ──
  if (!replyContent) {
    note._annoStatus = 'researching';
    note._resStep    = 0;
    renderAll();
    selNote(noteId);
    await delay(1200, signal);

    note._resStep = 1;
    updateResearchStep(noteId, 1);
    await delay(1200, signal);

    note._annoStatus = 'thinking';
    note._resStep    = 2;
    updateResearchStep(noteId, 2);
    await delay(1000, signal);
  } else {
    note._annoStatus = 'thinking';
    renderAll(); selNote(noteId);
    await delay(500, signal);
  }

  // ── Build messages ──
  const messages = [{ role:'system', content:SYSTEM_PROMPT }];
  const typeLabel = TYPE_LABELS[note.type] || '笔记';

  if (note.thread.length === 0 || (note.thread.length === 1 && note.thread[0].role==='user' && replyContent)) {
    messages.push({
      role:'user',
      content:`[类型：${typeLabel}]\n\n${note.content}\n\n请对以上内容进行深度批注。`
    });
  } else {
    messages.push({ role:'user', content:`[类型：${typeLabel}]\n\n${note.content}\n\n请对以上内容进行深度批注。` });
    note.thread.forEach(m => {
      messages.push({ role:m.role==='assistant'?'assistant':'user', content:m.content });
    });
  }

  // ── Start streaming ──
  note._annoStatus = 'streaming';
  renderAll(); selNote(noteId);

  let fullContent = '';
  let msgIdx      = -1;

  try {
    const resp = await fetch(DS_API, {
      method:'POST',
      signal,
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${apiKey}`
      },
      body:JSON.stringify({
        model:      DS_MODEL,
        messages,
        stream:     true,
        max_tokens: 2000,
        temperature:1.0
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    // Add AI message placeholder
    const aiMsg = { role:'assistant', content:'', ts:new Date().toISOString() };
    if (!replyContent) {
      note.thread = [aiMsg];
    } else {
      note.thread.push(aiMsg);
    }
    msgIdx = note.thread.length - 1;
    renderAll(); selNote(noteId);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const chunk = JSON.parse(data).choices?.[0]?.delta?.content;
          if (chunk) {
            fullContent += chunk;
            note.thread[msgIdx].content = fullContent;
            const textEl  = document.getElementById(`actext_${noteId}`);
            const lastThr = document.querySelector(`.anno-card[data-id="${noteId}"] .reply-thread .thread-text:last-child`);
            if (!replyContent && textEl) {
              textEl.innerHTML = mdToHtml(fullContent);
              textEl.classList.add('streaming-cur');
            } else if (replyContent && lastThr) {
              lastThr.innerHTML = mdToHtml(fullContent);
              lastThr.classList.add('streaming-cur');
            } else {
              renderAll(); selNote(noteId);
            }
            const ac = document.querySelector(`.anno-card[data-id="${noteId}"]`);
            if (ac) ac.querySelector('.ac-body, .reply-thread')?.scrollIntoView?.({ block:'nearest' });
          }
        } catch(_){}
      }
    }

    // Finalize
    if (msgIdx >= 0) {
      note.thread[msgIdx].content = fullContent;
      note.thread[msgIdx].ts      = new Date().toISOString();
    }
    note._annoStatus   = 'done';
    note._lastAnnoTime = new Date().toISOString();
    await dbPut(note);
    scheduleSyncCloud();

  } catch(e) {
    if (e.name === 'AbortError') {
      // User manually stopped — keep whatever was generated so far
      if (msgIdx >= 0 && fullContent) {
        note.thread[msgIdx].content = fullContent;
        note.thread[msgIdx].ts      = new Date().toISOString();
        note._annoStatus = 'done';
        await dbPut(note);
        showToast('已停止，已保留已生成内容');
      } else {
        if (msgIdx >= 0) note.thread.splice(msgIdx, 1);
        note._annoStatus = note.thread.length > 0 ? 'done' : 'idle';
        showToast('已停止生成');
      }
    } else {
      note._annoStatus = note.thread.length > 0 ? 'done' : 'idle';
      if (msgIdx >= 0 && !fullContent) note.thread.splice(msgIdx, 1);
      showToast('批注失败: ' + e.message);
      console.error(e);
    }
    await dbPut(note).catch(()=>{});
  } finally {
    streaming  = false;
    abortCtrl  = null;
    document.getElementById('cSend').disabled = false;
    renderAll();
    selNote(noteId);
    updateReplyBar();
  }
}

function updateResearchStep(noteId, step) {
  // Try to update just the step without full re-render
  const note = notes.find(n=>n.id===noteId);
  if (!note) return;
  note._resStep = step;
  // Update DOM directly
  for (let i=0; i<step; i++) {
    const el = document.getElementById(`rs_${noteId}_${i}`);
    if (el) {
      el.classList.add('visible','done');
      const spinner = el.querySelector('.ra-spinner');
      if (spinner) spinner.outerHTML = '<span style="font-size:13px">✓</span>';
    }
  }
  const cur = document.getElementById(`rs_${noteId}_${step}`);
  if (cur) cur.classList.add('visible');
  schedRedraw();
}

  const card = document.querySelector(`.anno-card[data-id="${noteId}"]`);

// ═══════════════════════════════════════════════════════
//  MOBILE BOTTOM REPLY BAR
// ═══════════════════════════════════════════════════════
function updateReplyBar() {
  const ta        = document.getElementById('arbInput');
  const btn       = document.getElementById('arbSend');
  const ctx       = document.getElementById('arbCtx');
  const stopRow   = document.getElementById('arbStopRow');
  const startRow  = document.getElementById('arbStartRow');
  const inputRow  = document.getElementById('arbInputRow');
  if (!ta) return;

  const note     = notes.find(n => n.id === selId);
  const canReply = note && note._annoStatus === 'done' && !streaming;
  const isIdle   = note && (note._annoStatus === 'idle' || !note._annoStatus);
  const isStuck  = note && !streaming &&
    ['researching','thinking','streaming'].includes(note._annoStatus);

  // Helper: show only one row
  function showRow(which) {
    if (stopRow)  stopRow.style.display  = which==='stop'  ? '' : 'none';
    if (startRow) startRow.style.display = which==='start' ? '' : 'none';
    if (inputRow) inputRow.style.display = which==='input' ? '' : 'none';
  }

  if (streaming) {
    showRow('stop');
    if (ctx) ctx.innerHTML = 'AI 批注生成中…';
    return;
  }

  if (!note) {
    showRow('input');
    ta.disabled = btn.disabled = true;
    ctx.innerHTML  = '← 从左侧选择一条笔记';
    ta.placeholder = '请先选择笔记';
    return;
  }

  if (isIdle || isStuck) {
    showRow('start');
    const startBtn = document.getElementById('arbStart');
    if (startBtn) startBtn.textContent = isStuck ? '🔄 重新批注' : '🚀 开始 AI 批注';
    ctx.innerHTML = isStuck ? '批注似乎卡住了' : '该笔记还没有 AI 批注';
    return;
  }

  if (canReply) {
    showRow('input');
    ta.disabled = btn.disabled = false;
    const preview = note.content.length > 40 ? note.content.slice(0,40)+'…' : note.content;
    ctx.innerHTML  = '回复：<strong>' + esc(preview) + '</strong>';
    ta.placeholder = '继续追问 AI，Ctrl+Enter 发送';
  } else {
    showRow('input');
    ta.disabled = btn.disabled = true;
    ctx.innerHTML  = 'AI 思考中，请稍候…';
    ta.placeholder = '批注完成后可追问';
  }
}

{

  const stopBtn = document.getElementById('arbStop');

  function doSendReply() {
    const content = ta.value.trim();

      }
      renderAll(); selNote(selId); updateReplyBar();
      showToast('已重置状态');
    }
  });
}

// ═══════════════════════════════════════════════════════
//  RE-ANNOTATE
// ═══════════════════════════════════════════════════════
// Force-reset a stuck note and retry annotation
async function forceRetry(noteId) {
  if (streaming) { if (abortCtrl) abortCtrl.abort(); streaming = false; abortCtrl = null; }
  const note = notes.find(n=>n.id===noteId);
  if (!note) return;
  note.thread      = [];
  note._annoStatus = 'idle';
  note._resStep    = -1;
  await dbPut(note);
  renderAll();
  selNote(noteId, true);
  updateReplyBar();
  await annotate(noteId, null);
}

async function reAnnotate(noteId, e) {
  if (e) e.stopPropagation();
  const note = notes.find(n=>n.id===noteId);
  if (!note || streaming) return;
  note.thread      = [];
  note._annoStatus = 'idle';
  note._resStep    = -1;
  await dbPut(note);
  renderAll();
  selNote(noteId, true);
  updateReplyBar();
  await annotate(noteId, null);
}

//  CONTINUE ANNOTATION (继续生成)
// ═══════════════════════════════════════════════════════
async function continueAnnotate(noteId, e) {
  if (e) e.stopPropagation();
  const note = notes.find(n=>n.id===noteId);
  if (!note || streaming) return;
  await annotate(noteId, '请继续完成你之前的批注，从中断的位置接续输出，不要重复已有内容。', true);
}

// ═══════════════════════════════════════════════════════
//  COPY ANNOTATION
// ═══════════════════════════════════════════════════════
async function copyAnno(noteId, e) {
  if (e) e.stopPropagation();
  const note = notes.find(n=>n.id===noteId);
  if (!note) return;
  const text = note.thread?.find(m=>m.role==='assistant')?.content || '';
  if (!text) { showToast('暂无批注内容'); return; }
  try {
    await navigator.clipboard.writeText(text);
    showToast('批注已复制');
  } catch(_) { showToast('复制失败，请手动选择文字'); }
}

}

// ═══════════════════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════════════════
async function sbReq(path, opts={}) {
  const h = {
    apikey:        SB_KEY,
    Authorization:`Bearer ${sbSess?.access_token||SB_KEY}`,
    'Content-Type':'application/json',
    ...(opts.headers||{})
  };
  const r = await fetch(SB_URL+path, {...opts, headers:h});
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||`${r.status}`); }
  return r.status===204?null:r.json();
}
async function sbLogin(email,pwd) {
  const d = await sbReq('/auth/v1/token?grant_type=password',{
    method:'POST',body:JSON.stringify({email,password:pwd})
  });
  sbSess = d;
  localStorage.setItem('sb_sess',JSON.stringify(d));
  return d;
}
async function sbSignup(email,pwd) {
  const d = await sbReq('/auth/v1/signup',{
    method:'POST',body:JSON.stringify({email,password:pwd})
  });
  if (d.access_token){ sbSess=d; localStorage.setItem('sb_sess',JSON.stringify(d)); }
  return d;
}
async function sbRefresh(token) {
  return sbReq('/auth/v1/token?grant_type=refresh_token',{
    method:'POST',body:JSON.stringify({refresh_token:token})
  });
}
async function doLogout() {
  await sbReq('/auth/v1/logout',{method:'POST'}).catch(()=>{});
  sbSess=null; localStorage.removeItem('sb_sess');
  closeMo('moAuth'); updateAuthUI(); showToast('已退出登录');
}
async function syncToCloud() {
  if (!sbSess) return;
  const pill = document.getElementById('syncPill');
  pill.textContent='同步中…'; pill.className='sync-pill busy';
  try {
    // Strip internal render fields before sync
    const clean = notes.map(n=>({...n, _annoStatus:n._annoStatus, _resStep:n._resStep, _lastAnnoTime:n._lastAnnoTime}));
    await sbReq('/rest/v1/sync_data',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({
        user_id:  sbSess.user.id,
        app_name:'thinknote',
        data:     {notes:clean},
        updated_at:new Date().toISOString()
      })
    });
    pill.textContent='已同步 ✓'; pill.className='sync-pill ok';
  } catch(e) {
    pill.textContent='同步失败'; pill.className='sync-pill';
    console.error('sync',e);
  }
}
async function loadFromCloud() {
  if (!sbSess) return;
  try {
    const d = await sbReq(`/rest/v1/sync_data?user_id=eq.${sbSess.user.id}&app_name=eq.thinknote`);
    if (d?.[0]?.data?.notes?.length) {
      const cloud   = d[0].data.notes;
      const cloudIds= new Set(cloud.map(n=>n.id));
      const local   = notes.filter(n=>!cloudIds.has(n.id));
      notes = [...cloud,...local];
      for (const n of notes) await dbPut(n);
      renderAll();
      if (selId) selNote(selId);
    }
  } catch(e){ console.error('cloud load',e); }
}
function scheduleSyncCloud() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 3000);
}

// ═══════════════════════════════════════════════════════
//  AUTH MODAL
// ═══════════════════════════════════════════════════════
function toggleAuth() {
  authMode = authMode==='login'?'signup':'login';
  document.getElementById('moAuthTitle').textContent  = authMode==='login'?'👤 登录账号':'👤 注册账号';
  document.getElementById('moAuthSub').textContent    = authMode==='login'?'登录后笔记与批注自动云同步':'创建账号，多设备共享笔记';
  document.getElementById('authToggle').textContent   = authMode==='login'?'没有账号？注册':'已有账号？登录';
  document.getElementById('authSubmit').textContent   = authMode==='login'?'登录':'注册';
  document.getElementById('authErr').style.display    = 'none';
}
async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pwd   = document.getElementById('authPwd').value;
  const errEl = document.getElementById('authErr');
  if (!email||!pwd){ errEl.textContent='请填写邮箱和密码'; errEl.style.display='block'; return; }
  const btn = document.getElementById('authSubmit');
  btn.disabled=true; btn.textContent='请稍候…'; errEl.style.display='none';
  try {
    if (authMode==='login') await sbLogin(email,pwd);
    else                    await sbSignup(email,pwd);
    closeMo('moAuth'); updateAuthUI();
    await loadFromCloud(); scheduleSyncCloud();
    showToast(authMode==='login'?'登录成功':'注册成功');
  } catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
  } finally {
    btn.disabled=false;
    btn.textContent=authMode==='login'?'登录':'注册';
  }
}
function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  const pill= document.getElementById('syncPill');
  if (sbSess) {
    btn.classList.add('on');
    btn.title = sbSess.user.email;
    pill.textContent='云同步'; pill.className='sync-pill ok';
    document.getElementById('logoutSep').style.display='';
    document.getElementById('logoutArea').style.display='';
  } else {
    btn.classList.remove('on');
    btn.title = '登录账号';
    pill.textContent='本地'; pill.className='sync-pill';
    document.getElementById('logoutSep').style.display='none';
    document.getElementById('logoutArea').style.display='none';
  }
}
document.getElementById('authBtn').addEventListener('click',()=>{
  if (sbSess) {
    document.getElementById('moAuthTitle').textContent='👤 已登录';
    document.getElementById('moAuthSub').textContent=sbSess.user.email;
    document.getElementById('authEmail').style.display='none';
    document.getElementById('authPwd').style.display='none';
    document.querySelectorAll('#moAuth .mo-label').forEach(l=>l.style.display='none');
    document.getElementById('authSubmit').style.display='none';
    document.getElementById('authToggle').style.display='none';
    document.getElementById('logoutSep').style.display='';
    document.getElementById('logoutArea').style.display='';
  } else {
    document.getElementById('authEmail').style.display='';
    document.getElementById('authPwd').style.display='';
    document.querySelectorAll('#moAuth .mo-label').forEach(l=>l.style.display='');
    document.getElementById('authSubmit').style.display='';
    document.getElementById('authToggle').style.display='';
    document.getElementById('logoutSep').style.display='none';
    document.getElementById('logoutArea').style.display='none';
    authMode='login';
    document.getElementById('moAuthTitle').textContent='👤 登录账号';
    document.getElementById('moAuthSub').textContent='登录后笔记与批注自动云同步';
    document.getElementById('authToggle').textContent='没有账号？注册';
    document.getElementById('authSubmit').textContent='登录';
    document.getElementById('authErr').style.display='none';
  }
  openMo('moAuth');
});

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastT;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════════
//  SCROLL & RESIZE → redraw connectors
// ═══════════════════════════════════════════════════════
document.getElementById('docScroll') .addEventListener('scroll', schedRedraw);
document.getElementById('annoScroll').addEventListener('scroll', schedRedraw);
window.addEventListener('resize', schedRedraw);

// ─── RESIZABLE GUTTER (desktop / tablet) ─────────────────
{
  const gutterEl  = document.querySelector('.gutter');
  const docPaneEl = document.querySelector('.doc-pane');
  let resizing = false, startX, startW;

  function startResize(clientX) {
    resizing = true; startX = clientX; startW = docPaneEl.offsetWidth;
    gutterEl.classList.add('dragging');
    document.body.style.userSelect = 'none';
  }
  function doResize(clientX) {
    if (!resizing) return;
    const maxW = document.getElementById('mainContainer').offsetWidth - 240 - 28;
    docPaneEl.style.width = Math.max(240, Math.min(startW + clientX - startX, maxW)) + 'px';
    schedRedraw();
  }
  function endResize() {
    if (!resizing) return;
    resizing = false;
    gutterEl.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  }

  gutterEl.addEventListener('mousedown', e => {
    startResize(e.clientX);
    document.body.style.cursor = 'col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (resizing) doResize(e.clientX); });
  document.addEventListener('mouseup', endResize);

  gutterEl.addEventListener('touchstart', e => {
    startResize(e.touches[0].clientX);
    e.preventDefault();
  }, { passive:false });
  document.addEventListener('touchmove', e => { if (resizing) doResize(e.touches[0].clientX); }, { passive:true });
  document.addEventListener('touchend', endResize);
}

// ─── MOBILE SWIPE LEFT/RIGHT TO SWITCH TABS ─────────────
{
  let sx = 0, sy = 0;
  const mc = document.getElementById('mainContainer');
  mc.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive:true });
  mc.addEventListener('touchend', e=>{
    if (!isMobile()) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) * 1.5 && Math.abs(dx) > 55) {
      if (dx < 0 && mobileTab==='notes') switchMobileTab('annos');
      if (dx > 0 && mobileTab==='annos') switchMobileTab('notes');
    }
  }, { passive:true });
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.getElementById('cInput').addEventListener('keydown', e=>{
  if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)) addNote();
});
document.getElementById('cInput').addEventListener('input', function(){
  autoResize(this);
  const len = this.value.length;
  const el  = document.getElementById('cCount');
  if (!el) return;
  el.textContent = len > 0 ? len + ' 字' : '';
  el.classList.toggle('warn', len > 400);
});
document.getElementById('cSend').addEventListener('click', addNote);

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
async function init() {
  await initDB();

  const raw = await dbAll();
  // Restore _annoStatus for notes that already have thread
  notes = raw.map(n => ({
    ...n,
    _annoStatus: n.thread?.length>0 ? 'done' : 'idle',
    _resStep:    -1,
    _lastAnnoTime: n.thread?.filter(m=>m.role==='assistant').slice(-1)[0]?.ts || n.created_at
  })).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  renderAll();
  switchMobileTab('notes');
  if (notes.length>0) selNote(notes[0].id);
  updateReplyBar();

  // Restore Supabase session
  const saved = localStorage.getItem('sb_sess');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      const r = await sbRefresh(s.refresh_token).catch(()=>null);
      if (r?.access_token) {
        sbSess = r;
        localStorage.setItem('sb_sess', JSON.stringify(r));
      } else {
        sbSess = s;
      }
      updateAuthUI();
      await loadFromCloud();
    } catch(e) {
      sbSess=null; localStorage.removeItem('sb_sess');
    }
  }
}

init().catch(console.error);
</script>
